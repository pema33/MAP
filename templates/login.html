<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAP — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <span class="logo-icon">⛏</span>
      <span class="logo-text">MAP</span>
    </div>
    <p class="login-subtitle">Minecraft Admin Panel</p>

    <div class="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" class="input" id="loginUsername" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="input" id="loginPassword" autocomplete="current-password">
      </div>
      <div class="login-error hidden" id="loginError"></div>
      <button class="btn btn--primary login-submit" id="loginBtn">Sign In</button>
    </div>
  </div>

  <script>
    async function doLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl   = document.getElementById('loginError');
      const btn     = document.getElementById('loginBtn');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        const res  = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/';
        } else {
          errEl.textContent = data.error || 'Login failed';
          errEl.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Sign In';
          document.getElementById('loginPassword').value = '';
          document.getElementById('loginPassword').focus();
        }
      } catch (_) {
        errEl.textContent = 'Network error — is the server running?';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
